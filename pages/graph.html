<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph View — Christophsis · GAR Tactical</title>
  <link rel="stylesheet" href="../style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    body, html { overflow: hidden; }
    .map-wrapper { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; }
    #cy { position: absolute; inset: 0; background: transparent; }

    /* Info Panel */
    .info-panel {
      position: absolute; top: 16px; left: 16px;
      width: 230px; z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .info-panel-body { padding: 12px 14px; min-height: 80px; }
    .info-empty {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); line-height: 1.8;
    }
    .info-name {
      font-family: var(--font-title); font-size: 12px;
      font-weight: 700; color: var(--accent);
      letter-spacing: .08em; margin-bottom: 3px;
    }
    .info-type {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--text-dim); letter-spacing: .12em;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .info-conn-label {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--text-dim); letter-spacing: .1em;
      text-transform: uppercase; margin-bottom: 4px;
    }
    .info-conn-list {
      list-style: none; margin: 0; padding: 0;
    }
    .info-conn-list li {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text); padding: 2px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-conn-list li::before { content: '→ '; color: var(--accent2); }

    /* Legend */
    .graph-legend {
      position: absolute; bottom: 16px; left: 16px;
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 10px 14px;
    }
    .legend-title {
      font-family: var(--font-title); font-size: 9px;
      letter-spacing: .15em; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 8px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); margin-bottom: 4px;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-hex {
      width: 12px; height: 10px; flex-shrink: 0;
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }

    /* Controls */
    .graph-controls {
      position: absolute; bottom: 16px; right: 16px;
      z-index: 10; display: flex; flex-direction: column; gap: 4px;
    }
    .graph-controls .map-btn { width: 36px; height: 36px; }

    /* Path panel */
    .path-panel {
      position: absolute; top: 16px; right: 16px;
      width: 220px; z-index: 10;
      background: var(--panel);
      border: 1px solid var(--border);
    }
    .path-select {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-top: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 6px 10px;
      outline: none;
      appearance: none;
    }
    .path-select:focus { border-color: var(--accent); }
    .path-btn {
      width: 100%;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--font-title);
      font-size: 9px;
      letter-spacing: .12em;
      padding: 8px;
      cursor: pointer;
      transition: background .15s;
      text-transform: uppercase;
    }
    .path-btn:hover { background: var(--accent2); color: var(--bg); }
    .path-result {
      padding: 6px 10px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      min-height: 28px;
    }

    /* BG grid */
    .map-wrapper {
      background-image:
        radial-gradient(circle at 30% 40%, #00d4ff08 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, #0088bb06 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, #0a1a2a18 39px, #0a1a2a18 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, #0a1a2a18 39px, #0a1a2a18 40px);
    }
  </style>
</head>
<body>
  <div class="corner-deco corner-deco--tl"></div>
  <div class="corner-deco corner-deco--tr"></div>
  <div class="corner-deco corner-deco--bl"></div>
  <div class="corner-deco corner-deco--br"></div>

  <div class="fullscreen-layout">
    <header class="site-header">
      <a href="../index.html" class="header-logo">
        <span class="logo-badge">GAR</span>
        TACTICAL DATABASE
      </a>
      <div class="header-status">
        <span class="breadcrumb">
          <a href="../../index.html">HOME</a>
          <span class="breadcrumb-sep">/</span>
          <a href="index.html">CHRISTOPHSIS</a>
          <span class="breadcrumb-sep">/</span>
          <span class="text-accent">GRAPH VIEW</span>
        </span>
      </div>
    </header>

    <div class="map-wrapper" id="map-wrapper">
      <div id="cy"></div>

      <!-- Info Panel -->
      <div class="info-panel panel">
        <div class="panel-header">NODE INFO</div>
        <div class="info-panel-body" id="info-body">
          <div class="info-empty">Click a node to inspect<br>its location data and<br>connected tunnels.</div>
        </div>
      </div>

      <!-- Pathfinding Panel -->
      <div class="path-panel panel">
        <div class="panel-header">PATHFINDING</div>
        <select class="path-select" id="path-from">
          <option value="">From: Select node</option>
        </select>
        <select class="path-select" id="path-to">
          <option value="">To: Select node</option>
        </select>
        <button class="path-btn" id="path-btn">FIND PATH</button>
        <button class="path-btn" id="path-clear" style="color:var(--text-dim); font-size:8px;">CLEAR</button>
        <div class="path-result" id="path-result">Select two nodes to find a route.</div>
      </div>

      <!-- Legend -->
      <div class="graph-legend">
        <div class="legend-title">// NODE TYPES //</div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ff6644;box-shadow:0 0 6px #ff6644;"></div>
          <span>Reactor Core</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#00d4ff;box-shadow:0 0 6px #00d4ff;"></div>
          <span>Key Location</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#44ff88;box-shadow:0 0 6px #44ff88;"></div>
          <span>Crystal Cave</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ffaa00;box-shadow:0 0 6px #ffaa00;"></div>
          <span>Elevator / Access</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#aa88ff;box-shadow:0 0 6px #aa88ff;"></div>
          <span>Defensive Position</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#4a7a9b;"></div>
          <span>General Room</span>
        </div>
      </div>

      <!-- Graph Controls -->
      <div class="graph-controls">
        <button class="map-btn" id="cy-zoom-in" title="Zoom In">+</button>
        <button class="map-btn" id="cy-zoom-out" title="Zoom Out">−</button>
        <button class="map-btn" id="cy-fit" title="Fit" style="font-size:11px;">⌂</button>
      </div>
    </div>
  </div>

  <script>
    // ─── NODE DATA ─────────────────────────────────────────
    const nodes = [
      // Reactor Cores
      { id: 'rc1',  label: 'Reactor Core 1',     type: 'reactor',   pos: { x: 700, y: 520 } },
      { id: 'rc2',  label: 'Reactor Core 2',     type: 'reactor',   pos: { x: 580, y: 200 } },
      // Elevators
      { id: 'el1',  label: 'Elevator 1 (Mines)', type: 'elevator',  pos: { x: 220, y: 560 } },
      { id: 'el2',  label: 'Elevator 2 (N. Bridge FOB / Outside)', type: 'elevator', pos: { x: 860, y: 340 } },
      { id: 'elb',  label: 'Elevator B (Non-Functional)', type: 'elevator', pos: { x: 120, y: 300 } },
      { id: 'el4',  label: 'Elevator 4 (Non-Functional)', type: 'elevator', pos: { x: 820, y: 480 } },
      // Crystal Caves
      { id: 'cc1',  label: 'Natural Crystal Cave 1', type: 'crystal', pos: { x: 820, y: 600 } },
      { id: 'cc2',  label: 'Natural Crystal Cave 2', type: 'crystal', pos: { x: 740, y: 130 } },
      // Vehicle / Supply
      { id: 'vd2',  label: 'Vehicle Depot #2',   type: 'key',       pos: { x: 960, y: 380 } },
      { id: 'osd',  label: 'Outside Supply Depot', type: 'key',     pos: { x: 960, y: 310 } },
      // Brig
      { id: 'brig', label: 'Brig',               type: 'key',       pos: { x: 820, y: 250 } },
      { id: 'brig2', label: 'Big Brig',          type: 'key',       pos: { x: 380, y: 160 } },
      // Checkpoints
      { id: 'cp1',  label: 'Checkpoint',         type: 'defense',   pos: { x: 100, y: 380 } },
      { id: 'cp2',  label: 'Checkpoint (East)',  type: 'defense',   pos: { x: 820, y: 420 } },
      // Defensible positions
      { id: 'dh1',  label: 'Defensible Hall',    type: 'defense',   pos: { x: 100, y: 460 } },
      { id: 'dh2',  label: 'Defensible Hall (E)', type: 'defense',  pos: { x: 820, y: 360 } },
      { id: 'defpos', label: 'Defensive Position', type: 'defense', pos: { x: 330, y: 270 } },
      // Comm Rooms
      { id: 'comm1', label: 'Comms Room (N)',    type: 'room',      pos: { x: 420, y: 200 } },
      { id: 'comm2', label: 'Comms Room (W)',    type: 'room',      pos: { x: 210, y: 330 } },
      { id: 'comm3', label: 'Comms Rm (Central)', type: 'room',    pos: { x: 420, y: 370 } },
      { id: 'comm4', label: 'Comms Rm (E)',      type: 'room',      pos: { x: 620, y: 370 } },
      { id: 'comm5', label: 'Comms Rm (SE)',     type: 'room',      pos: { x: 740, y: 570 } },
      { id: 'comm6', label: 'Comms Rm (S)',      type: 'room',      pos: { x: 660, y: 620 } },
      // Chair Rooms
      { id: 'cr1',  label: 'Chair Room (NW)',    type: 'room',      pos: { x: 330, y: 200 } },
      { id: 'cr2',  label: 'Chair Room (W)',     type: 'room',      pos: { x: 200, y: 460 } },
      { id: 'cr3',  label: 'Chair Room (S)',     type: 'room',      pos: { x: 330, y: 540 } },
      { id: 'cr4',  label: 'Chair Room (SE)',    type: 'room',      pos: { x: 740, y: 640 } },
      // Control rooms
      { id: 'ctrl1', label: 'Control Rm (W)',    type: 'room',      pos: { x: 145, y: 310 } },
      { id: 'ctrl2', label: 'Control Rm',        type: 'room',      pos: { x: 240, y: 270 } },
      // Other
      { id: 'hub',  label: 'Hub Room',           type: 'room',      pos: { x: 420, y: 460 } },
      { id: 'sr1',  label: 'Small Reactor',      type: 'key',       pos: { x: 520, y: 460 } },
      { id: 'sm1',  label: 'Small Reactor (Alt)', type: 'key',      pos: { x: 600, y: 460 } },
      { id: 'sg',   label: 'Shield Gen. (Start)', type: 'key',      pos: { x: 300, y: 620 } },
      { id: 'mines', label: 'Mine Network (via Teleport)', type: 'key', pos: { x: 140, y: 660 } },
      { id: 'cafeteria', label: 'Cafeteria',     type: 'room',      pos: { x: 60,  y: 560 } },
      { id: 'barracks', label: 'Barracks',       type: 'room',      pos: { x: 50,  y: 500 } },
      { id: 'smr1', label: 'Small Room (W)',     type: 'room',      pos: { x: 80,  y: 430 } },
      { id: 'smr2', label: 'Small Room (E)',     type: 'room',      pos: { x: 870, y: 530 } },
      // Dead ends
      { id: 'de1',  label: 'Dead End (N)',       type: 'deadend',   pos: { x: 680, y: 280 } },
      { id: 'de2',  label: 'Dead End (E)',       type: 'deadend',   pos: { x: 720, y: 320 } },
      { id: 'de3',  label: 'Dead End (SW)',      type: 'deadend',   pos: { x: 200, y: 620 } },
    ];

    const edges = [
      // Reactor core connections
      ['rc1', 'cc1'], ['rc1', 'comm6'], ['rc1', 'comm5'], ['rc1', 'el4'],
      ['rc2', 'cc2'], ['rc2', 'brig'], ['rc2', 'comm1'],
      // Elevator connections
      ['el1', 'sg'], ['el1', 'mines'],
      ['el2', 'vd2'], ['el2', 'osd'], ['el2', 'dh2'],
      ['elb', 'cp1'], ['elb', 'ctrl1'],
      ['el4', 'cp2'], ['el4', 'dh2'],
      // Crystal caves
      ['cc2', 'brig'],
      // Key locations
      ['brig', 'dh2'],
      ['brig2', 'comm1'], ['brig2', 'cr1'],
      ['vd2', 'cp2'],
      // Checkpoint / defensible
      ['cp1', 'dh1'], ['cp1', 'smr1'],
      ['cp2', 'dh2'],
      ['dh1', 'cr2'], ['dh1', 'smr1'],
      ['dh2', 'smr2'],
      ['defpos', 'ctrl2'], ['defpos', 'comm3'],
      // Comms rooms
      ['comm1', 'cr1'], ['comm1', 'comm2'], ['comm1', 'defpos'],
      ['comm2', 'ctrl1'], ['comm2', 'ctrl2'],
      ['comm3', 'comm4'], ['comm3', 'hub'],
      ['comm4', 'de1'], ['comm4', 'de2'],
      ['comm5', 'comm6'],
      // Chair rooms
      ['cr1', 'defpos'],
      ['cr2', 'cafeteria'], ['cr2', 'barracks'],
      ['cr3', 'hub'], ['cr3', 'de3'],
      ['cr4', 'comm5'],
      // Control rooms
      ['ctrl1', 'ctrl2'],
      // Hub / central
      ['hub', 'sr1'], ['hub', 'sm1'], ['hub', 'cr3'],
      ['sr1', 'sm1'], ['sr1', 'comm4'],
      // Shield gen / start
      ['sg', 'cr3'], ['sg', 'dh1'],
      // Misc
      ['barracks', 'cafeteria'],
      ['smr2', 'cp2'],
    ];

    // ─── NODE TYPE STYLES ──────────────────────────────────
    const typeColors = {
      reactor:  { bg: '#ff6644', border: '#ff8866' },
      crystal:  { bg: '#44ff88', border: '#66ffaa' },
      elevator: { bg: '#ffaa00', border: '#ffcc44' },
      key:      { bg: '#00d4ff', border: '#44eeff' },
      defense:  { bg: '#aa88ff', border: '#cc99ff' },
      deadend:  { bg: '#333d4a', border: '#4a5a6a' },
      room:     { bg: '#1a3a5c', border: '#2a5a8c' },
    };

    const typeLabels = {
      reactor: 'Reactor Core', crystal: 'Crystal Cave',
      elevator: 'Elevator / Access', key: 'Key Location',
      defense: 'Defensive Position', deadend: 'Dead End', room: 'General Room',
    };

    // ─── BUILD CYTOSCAPE ELEMENTS ─────────────────────────
    const elements = [];
    nodes.forEach(n => {
      elements.push({
        data: { id: n.id, label: n.label, type: n.type },
        position: n.pos,
      });
    });
    edges.forEach(([s, t], i) => {
      elements.push({ data: { id: `e${i}`, source: s, target: t } });
    });

    // Populate path selectors
    const pathFrom = document.getElementById('path-from');
    const pathTo   = document.getElementById('path-to');
    nodes.forEach(n => {
      [pathFrom, pathTo].forEach(sel => {
        const opt = document.createElement('option');
        opt.value = n.id;
        opt.textContent = n.label;
        sel.appendChild(opt);
      });
    });

    // ─── CYTOSCAPE INIT ───────────────────────────────────
    const cy = cytoscape({
      container: document.getElementById('cy'),
      elements,
      layout: { name: 'preset' },
      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'text-valign': 'bottom',
            'text-halign': 'center',
            'color': '#b8d8ee',
            'font-family': '"Share Tech Mono", monospace',
            'font-size': '9px',
            'text-margin-y': '4px',
            'text-outline-width': 2,
            'text-outline-color': '#040b12',
            'width': 18,
            'height': 18,
            'border-width': 2,
            'background-color': ele => typeColors[ele.data('type')]?.bg || '#1a3a5c',
            'border-color': ele => typeColors[ele.data('type')]?.border || '#2a5a8c',
            'transition-property': 'width, height, background-color, border-color',
            'transition-duration': '0.15s',
          }
        },
        {
          selector: 'node[type="reactor"]',
          style: { 'width': 28, 'height': 28, 'shape': 'hexagon' }
        },
        {
          selector: 'node[type="key"]',
          style: { 'width': 22, 'height': 22, 'shape': 'diamond' }
        },
        {
          selector: 'node[type="crystal"]',
          style: { 'width': 22, 'height': 22 }
        },
        {
          selector: 'node[type="deadend"]',
          style: { 'width': 12, 'height': 12, 'opacity': 0.6 }
        },
        {
          selector: 'edge',
          style: {
            'width': 1.5,
            'line-color': '#1a4a6e',
            'curve-style': 'bezier',
            'opacity': 0.7,
            'transition-property': 'line-color, width, opacity',
            'transition-duration': '0.15s',
          }
        },
        {
          selector: 'node.selected',
          style: {
            'border-color': '#00d4ff',
            'border-width': 3,
            'width': ele => (parseFloat(cy.$(`#${ele.id()}`).style('width')) * 1.3) || 24,
            'height': ele => (parseFloat(cy.$(`#${ele.id()}`).style('height')) * 1.3) || 24,
          }
        },
        {
          selector: 'node.neighbor',
          style: {
            'border-color': '#00d4ff88',
            'border-width': 2,
            'opacity': 1,
          }
        },
        {
          selector: 'node.faded',
          style: { 'opacity': 0.2 }
        },
        {
          selector: 'edge.highlighted',
          style: {
            'line-color': '#00d4ff',
            'width': 2.5,
            'opacity': 1,
          }
        },
        {
          selector: 'edge.faded',
          style: { 'opacity': 0.08 }
        },
        {
          selector: 'edge.path-edge',
          style: {
            'line-color': '#44ff88',
            'width': 3,
            'opacity': 1,
          }
        },
        {
          selector: 'node.path-node',
          style: {
            'border-color': '#44ff88',
            'border-width': 3,
            'background-color': '#1a4a2a',
          }
        },
      ],
      userZoomingEnabled: true,
      userPanningEnabled: true,
      boxSelectionEnabled: false,
    });

    cy.fit(cy.nodes(), 60);

    // ─── NODE CLICK ───────────────────────────────────────
    const infoBody = document.getElementById('info-body');

    cy.on('tap', 'node', function(evt) {
      const node = evt.target;
      const nid = node.id();
      const data = node.data();

      // Highlight
      cy.elements().removeClass('selected neighbor faded highlighted path-edge path-node');
      const neighbors = node.neighborhood();
      const connEdges = node.connectedEdges();
      cy.elements().not(node).not(neighbors).addClass('faded');
      neighbors.nodes().addClass('neighbor');
      connEdges.addClass('highlighted');
      node.addClass('selected');

      // Connected node names
      const connNodes = node.neighborhood('node');
      const connList = connNodes.map(n => `<li>${n.data('label')}</li>`).join('');

      infoBody.innerHTML = `
        <div class="info-name">${data.label}</div>
        <div class="info-type">${typeLabels[data.type] || data.type}</div>
        <div class="info-conn-label">Connected (${connNodes.length})</div>
        <ul class="info-conn-list">${connList || '<li style="color:var(--text-dim)">None</li>'}</ul>
      `;
    });

    cy.on('tap', function(evt) {
      if (evt.target === cy) {
        cy.elements().removeClass('selected neighbor faded highlighted path-edge path-node');
        infoBody.innerHTML = '<div class="info-empty">Click a node to inspect<br>its location data and<br>connected tunnels.</div>';
        document.getElementById('path-result').textContent = 'Select two nodes to find a route.';
      }
    });

    // ─── PATHFINDING ──────────────────────────────────────
    document.getElementById('path-btn').onclick = () => {
      const fromId = pathFrom.value;
      const toId = pathTo.value;
      const pathResult = document.getElementById('path-result');

      if (!fromId || !toId) {
        pathResult.textContent = 'Select both From and To nodes.';
        return;
      }
      if (fromId === toId) {
        pathResult.textContent = 'From and To must be different nodes.';
        return;
      }

      cy.elements().removeClass('path-edge path-node selected neighbor faded highlighted');

      const dijkstra = cy.elements().dijkstra({
        root: `#${fromId}`,
        directed: false,
      });
      const pathTo_node = cy.$(`#${toId}`);
      const path = dijkstra.pathTo(pathTo_node);

      if (path.length === 0) {
        pathResult.textContent = '⚠ No route found between these nodes.';
        return;
      }

      cy.elements().not(path).addClass('faded');
      path.nodes().addClass('path-node');
      path.edges().addClass('path-edge');

      const nodeCount = path.nodes().length;
      const steps = path.nodes().map(n => n.data('label')).join(' → ');
      pathResult.innerHTML = `<strong style="color:var(--success)">Route found: ${nodeCount - 1} hop(s)</strong><br>${steps}`;
    };

    document.getElementById('path-clear').onclick = () => {
      cy.elements().removeClass('path-edge path-node selected neighbor faded highlighted');
      pathFrom.value = '';
      pathTo.value = '';
      document.getElementById('path-result').textContent = 'Select two nodes to find a route.';
      infoBody.innerHTML = '<div class="info-empty">Click a node to inspect<br>its location data and<br>connected tunnels.</div>';
    };

    // ─── GRAPH CONTROLS ───────────────────────────────────
    document.getElementById('cy-zoom-in').onclick  = () => cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
    document.getElementById('cy-zoom-out').onclick = () => cy.zoom({ level: cy.zoom() / 1.3, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
    document.getElementById('cy-fit').onclick = () => cy.fit(cy.nodes(), 60);
  </script>
</body>
</html>
