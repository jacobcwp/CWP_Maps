<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naboo Surface Map — 41ST TACTICAL</title>
  <link rel="icon" href="../../logo/41stLogo.png">
  <link rel="stylesheet" href="../../style.css">
  <style>
    body, html { overflow: hidden; }
    .info-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 20;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }
    .info-bar-title {
      font-family: var(--font-title);
      font-size: 11px; font-weight: 600;
      color: var(--text-bright);
      letter-spacing: .1em;
    }
    .info-sep { color: var(--border-glow); }
    .info-bar { position: absolute; top: 56px; left: 0; right: 0; }
    .fullscreen-layout .map-wrapper { position: absolute; top: 92px; left: 0; right: 0; bottom: 0; }
    .map-viewport { position: absolute; inset: 0; }
    .map-container {
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      user-select: none;
    }
    .map-container img {
      display: block;
      max-width: none;
      user-drag: none;
      user-select: none;
      pointer-events: none;
    }
    .map-controls {
      position: absolute;
      bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 4px;
      align-items: flex-end;
      z-index: 10;
    }
    .reset-btn {
      font-size: 10px; letter-spacing: .08em;
    }
    .zoom-display {
      background: var(--panel);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-dim);
      padding: 4px 10px;
      text-align: center;
      min-width: 60px;
    }
    .help-tip {
      position: absolute;
      bottom: 20px; left: 20px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 8px 12px;
      z-index: 10;
      line-height: 1.8;
    }
    .help-tip kbd {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 0 4px;
      font-size: 9px;
      color: var(--accent2);
    }
  </style>
</head>
<body>
  <div class="corner-deco corner-deco--tl"></div>
  <div class="corner-deco corner-deco--tr"></div>
  <div class="corner-deco corner-deco--bl"></div>
  <div class="corner-deco corner-deco--br"></div>

  <div class="fullscreen-layout">
    <header class="site-header">
      <a href="../../index.html" class="header-logo">
        <img src="../../logo/41stLogo.png" alt="41st Logo" style="height: 28px; width: auto;">
        41ST TACTICAL DATABASE
      </a>
      <div class="header-status">
        <span class="breadcrumb">
          <a href="../../index.html">HOME</a>
          <span class="breadcrumb-sep">/</span>
          <a href="index.html">NABOO</a>
          <span class="breadcrumb-sep">/</span>
          <span class="text-accent">SURFACE MAP</span>
        </span>
      </div>
    </header>

    <div class="info-bar">
      <span class="info-bar-title">SURFACE MAP</span>
      <span class="info-sep">|</span>
      <span>EXTERIOR SURVEY</span>
      <span class="info-sep">|</span>
      <span>NABOO SECTOR</span>
      <span class="info-sep" style="margin-left:auto">|</span>
      <span id="zoom-readout">ZOOM: 100%</span>
      <span class="info-sep">|</span>
      <span id="coord-readout">X: — · Y: —</span>
    </div>

    <div class="map-wrapper">
      <div class="map-viewport" id="viewport">
        <div class="map-container" id="map-container">
          <img id="map-img" src="../../assets/Naboo.png" alt="Naboo surface map" draggable="false">
        </div>
      </div>

      <div class="map-controls">
        <button class="map-btn" id="btn-zoom-in" title="Zoom In">+</button>
        <div class="zoom-display" id="zoom-label">100%</div>
        <button class="map-btn" id="btn-zoom-out" title="Zoom Out">−</button>
        <button class="map-btn reset-btn" id="btn-reset" title="Reset View">⌂</button>
        <button class="map-btn" id="btn-download" title="Download Map">↓</button>
      </div>

      <div class="help-tip">
        <kbd>Scroll</kbd> Zoom &nbsp;·&nbsp; <kbd>Drag</kbd> Pan &nbsp;·&nbsp; <kbd>⌂</kbd> Reset
      </div>
    </div>
  </div>

  <script src="../../scripts/map-viewer.js"></script>
</body>
</html>
