<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leesis Tunnels — Christophsis · GAR Tactical</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body, html { overflow: hidden; }
    .info-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px;
      gap: 16px;
      z-index: 20;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
    }
    .info-bar-title {
      font-family: var(--font-title);
      font-size: 11px; font-weight: 600;
      color: var(--text-bright);
      letter-spacing: .1em;
    }
    .info-sep { color: var(--border-glow); }
    .map-wrapper { position: absolute; top: 92px; left: 0; right: 0; bottom: 0; }
    .map-viewport { position: absolute; inset: 0; }
    .map-controls { position: absolute; bottom: 20px; right: 20px; }
    .reset-btn {
      font-size: 10px; letter-spacing: .08em;
    }
    .zoom-display {
      background: var(--panel);
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 10px; color: var(--text-dim);
      padding: 4px 10px;
      text-align: center;
      min-width: 60px;
    }
    .help-tip {
      position: absolute;
      bottom: 20px; left: 20px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 8px 12px;
      z-index: 10;
      line-height: 1.8;
    }
    .help-tip kbd {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 0 4px;
      font-size: 9px;
      color: var(--accent2);
    }
  </style>
</head>
<body>
  <div class="corner-deco corner-deco--tl"></div>
  <div class="corner-deco corner-deco--tr"></div>
  <div class="corner-deco corner-deco--bl"></div>
  <div class="corner-deco corner-deco--br"></div>

  <div class="fullscreen-layout">
    <header class="site-header">
      <a href="../index.html" class="header-logo">
        <span class="logo-badge">GAR</span>
        TACTICAL DATABASE
      </a>
      <div class="header-status">
        <span class="breadcrumb">
          <a href="../../index.html">HOME</a>
          <span class="breadcrumb-sep">/</span>
          <a href="index.html">CHRISTOPHSIS</a>
          <span class="breadcrumb-sep">/</span>
          <span class="text-accent">TUNNEL MAP</span>
        </span>
      </div>
    </header>

    <div class="map-wrapper">
      <div class="info-bar">
        <span class="info-bar-title">LEESIS TUNNELS</span>
        <span class="info-sep">|</span>
        <span>SURVEY CS-5064</span>
        <span class="info-sep">|</span>
        <span>41ST ARF · MAP DIVISION</span>
        <span class="info-sep" style="margin-left:auto">|</span>
        <span id="zoom-readout">ZOOM: 100%</span>
        <span class="info-sep">|</span>
        <span id="coord-readout">X: — · Y: —</span>
      </div>

      <div class="map-viewport" id="viewport">
        <div class="map-container" id="map-container">
          <img id="map-img" src="../assets/christophsis_tunnels.png" alt="Leesis Tunnels Map"
               draggable="false">
        </div>
      </div>

      <div class="map-controls" style="flex-direction:column;gap:4px;">
        <button class="map-btn" id="btn-zoom-in" title="Zoom In">+</button>
        <div class="zoom-display" id="zoom-label">100%</div>
        <button class="map-btn" id="btn-zoom-out" title="Zoom Out">−</button>
        <button class="map-btn reset-btn" id="btn-reset" title="Reset View" style="font-size:11px;">⌂</button>
      </div>

      <div class="help-tip">
        <kbd>Scroll</kbd> Zoom &nbsp;·&nbsp; <kbd>Drag</kbd> Pan &nbsp;·&nbsp; <kbd>⌂</kbd> Reset
      </div>
    </div>
  </div>

  <script>
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('map-container');
    const img = document.getElementById('map-img');
    const zoomReadout = document.getElementById('zoom-readout');
    const zoomLabel = document.getElementById('zoom-label');
    const coordReadout = document.getElementById('coord-readout');

    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let startX, startY, startPanX, startPanY;

    const MIN_SCALE = 0.1;
    const MAX_SCALE = 8;
    const ZOOM_FACTOR = 1.15;

    function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

    function applyTransform() {
      container.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      const pct = Math.round(scale * 100);
      zoomReadout.textContent = `ZOOM: ${pct}%`;
      zoomLabel.textContent = `${pct}%`;
    }

    function fitToView() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      const iw = img.naturalWidth || img.width || 1000;
      const ih = img.naturalHeight || img.height || 1000;
      const sx = (vw * 0.9) / iw;
      const sy = (vh * 0.9) / ih;
      scale = Math.min(sx, sy, 1);
      panX = (vw - iw * scale) / 2;
      panY = (vh - ih * scale) / 2;
      applyTransform();
    }

    img.onload = () => fitToView();
    if (img.complete) fitToView();

    // ─── Pan ─────────────────────────────────────────────
    viewport.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      startPanX = panX;
      startPanY = panY;
      viewport.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) {
        // Update coord readout
        const rect = viewport.getBoundingClientRect();
        const mx = (e.clientX - rect.left - panX) / scale;
        const my = (e.clientY - rect.top - panY) / scale;
        coordReadout.textContent = `X: ${Math.round(mx)} · Y: ${Math.round(my)}`;
        return;
      }
      panX = startPanX + (e.clientX - startX);
      panY = startPanY + (e.clientY - startY);
      applyTransform();
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
      viewport.style.cursor = 'grab';
    });

    // ─── Touch pan ───────────────────────────────────────
    let lastTouchX, lastTouchY, lastDist = null;
    viewport.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        lastDist = null;
      } else if (e.touches.length === 2) {
        lastDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
      e.preventDefault();
    }, { passive: false });

    viewport.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && lastDist === null) {
        panX += e.touches[0].clientX - lastTouchX;
        panY += e.touches[0].clientY - lastTouchY;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        applyTransform();
      } else if (e.touches.length === 2) {
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        if (lastDist) {
          const ratio = dist / lastDist;
          const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          const rect = viewport.getBoundingClientRect();
          zoomAt(cx - rect.left, cy - rect.top, ratio);
        }
        lastDist = dist;
      }
      e.preventDefault();
    }, { passive: false });

    // ─── Scroll zoom ─────────────────────────────────────
    viewport.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = viewport.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? ZOOM_FACTOR : 1 / ZOOM_FACTOR;
      zoomAt(mouseX, mouseY, factor);
    }, { passive: false });

    function zoomAt(mx, my, factor) {
      const newScale = clamp(scale * factor, MIN_SCALE, MAX_SCALE);
      const ratio = newScale / scale;
      panX = mx - ratio * (mx - panX);
      panY = my - ratio * (my - panY);
      scale = newScale;
      applyTransform();
    }

    // ─── Buttons ──────────────────────────────────────────
    document.getElementById('btn-zoom-in').onclick = () => {
      const cx = viewport.clientWidth / 2;
      const cy = viewport.clientHeight / 2;
      zoomAt(cx, cy, ZOOM_FACTOR * 1.5);
    };
    document.getElementById('btn-zoom-out').onclick = () => {
      const cx = viewport.clientWidth / 2;
      const cy = viewport.clientHeight / 2;
      zoomAt(cx, cy, 1 / (ZOOM_FACTOR * 1.5));
    };
    document.getElementById('btn-reset').onclick = fitToView;
  </script>
</body>
</html>
