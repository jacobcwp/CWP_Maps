<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surface Map — Christophsis · GAR Tactical</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body, html { overflow: hidden; }
    .map-wrapper { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; }
    .map-viewport { position: absolute; inset: 0; }
    .placeholder-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    .placeholder-icon {
      font-size: 64px;
      filter: drop-shadow(0 0 20px var(--accent));
      animation: pulse-icon 3s ease-in-out infinite;
    }
    @keyframes pulse-icon {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }
    .placeholder-title {
      font-family: var(--font-title);
      font-size: 20px; font-weight: 700;
      letter-spacing: .12em; color: var(--text-dim);
    }
    .placeholder-sub {
      font-family: var(--font-mono);
      font-size: 11px; color: var(--text-dim);
      text-align: center; line-height: 1.8;
      max-width: 340px;
    }
    .uploading-bar {
      width: 280px; height: 2px;
      background: var(--border);
      position: relative; overflow: hidden;
    }
    .uploading-bar::after {
      content: '';
      position: absolute; top: 0; left: -60%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan-bar 2.5s ease-in-out infinite;
    }
    @keyframes scan-bar {
      0% { left: -60%; } 100% { left: 100%; }
    }
    .back-link {
      font-family: var(--font-title);
      font-size: 10px; letter-spacing: .12em;
      color: var(--accent); text-decoration: none;
      border: 1px solid var(--border-glow);
      padding: 8px 18px;
      clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
      transition: all .2s;
    }
    .back-link:hover {
      background: var(--accent); color: var(--bg);
      box-shadow: var(--glow);
    }
  </style>
</head>
<body>
  <div class="corner-deco corner-deco--tl"></div>
  <div class="corner-deco corner-deco--tr"></div>
  <div class="corner-deco corner-deco--bl"></div>
  <div class="corner-deco corner-deco--br"></div>

  <div class="fullscreen-layout">
    <header class="site-header">
      <a href="../index.html" class="header-logo">
        <span class="logo-badge">GAR</span>
        TACTICAL DATABASE
      </a>
      <div class="header-status">
        <span class="breadcrumb">
          <a href="../../index.html">HOME</a>
          <span class="breadcrumb-sep">/</span>
          <a href="index.html">CHRISTOPHSIS</a>
          <span class="breadcrumb-sep">/</span>
          <span class="text-accent">SURFACE MAP</span>
        </span>
      </div>
    </header>

    <div class="map-wrapper">
      <div class="map-viewport">
        <div class="placeholder-screen">
          <div class="placeholder-icon">🌐</div>
          <div class="placeholder-title">SURFACE MAP PENDING</div>
          <div class="placeholder-sub">
            No surface map image has been uploaded.<br>
            Add <code style="color:var(--accent2)">christophsis_surface.png</code> to the <code style="color:var(--accent2)">/assets/</code> folder to activate this view.
          </div>
          <div class="uploading-bar"></div>
          <a href="index.html" class="back-link">← BACK TO CHRISTOPHSIS</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
